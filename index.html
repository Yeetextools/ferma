<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a6010">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>🌻 Весёлая Ферма</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  height: 100%;
  height: -webkit-fill-available;
}
body {
  width: 100%;
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: #4aaa42;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  user-select: none;
  -webkit-user-select: none;
}

/* WORLD */
#world {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, #5dc8f5 0%, #8edcf8 28%, #8fdb60 28%, #7acc52 55%, #5aac3a 100%);
  overflow: hidden;
}
#sun { position:absolute;top:3%;right:8%;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#fffde7 25%,#ffe082 60%,transparent 100%);box-shadow:0 0 48px 18px rgba(255,225,50,.3);animation:sunPulse 5s ease-in-out infinite }
@keyframes sunPulse{0%,100%{box-shadow:0 0 48px 18px rgba(255,225,50,.28)}50%{box-shadow:0 0 72px 30px rgba(255,225,50,.46)}}
.cloud{position:absolute;border-radius:60px;background:rgba(255,255,255,.9);animation:cloudDrift linear infinite;filter:drop-shadow(0 3px 6px rgba(150,200,255,.2))}
@keyframes cloudDrift{from{transform:translateX(-180px)}to{transform:translateX(110vw)}}
#ground{position:absolute;bottom:0;left:0;right:0;height:70%;background:linear-gradient(180deg,#7acc52 0%,#5aac3a 40%,#489030 100%)}
#lake{position:absolute;left:-5%;width:25%;border-radius:0 55% 55% 0;background:linear-gradient(150deg,#64b5f6,#1e88e5);opacity:.72;animation:lakeShimmer 4s ease-in-out infinite}
@keyframes lakeShimmer{0%,100%{opacity:.7}50%{opacity:.85}}
#shadow-strip{position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(0deg,rgba(0,40,0,.2),transparent);pointer-events:none;z-index:4}

/* DECO */
#deco{position:absolute;inset:0;pointer-events:none;z-index:7}
.fpost{position:absolute;background:linear-gradient(90deg,#d4a860,#b8883a);border-radius:3px 3px 2px 2px;box-shadow:2px 3px 5px rgba(0,0,0,.22)}
.frail{position:absolute;background:linear-gradient(90deg,#c89848,#b07830);border-radius:2px;box-shadow:0 2px 4px rgba(0,0,0,.18)}
.bush-puff{position:absolute;border-radius:50%;background:radial-gradient(circle at 38% 32%,#88d448,#4a8c20);box-shadow:0 4px 8px rgba(0,0,0,.18)}
.stone{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,#d0c8b8,#9a9080);box-shadow:inset 0 3px 6px rgba(255,255,255,.28),0 3px 5px rgba(0,0,0,.2)}
.flower-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;animation:flowerSway 3s ease-in-out infinite;transform-origin:bottom center}
@keyframes flowerSway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(5deg)}}
.gtuft{position:absolute;display:flex;align-items:flex-end;gap:1px}
.gb{background:#4aaa42;border-radius:2px 2px 0 0;transform-origin:bottom center;animation:gbSway ease-in-out infinite}
@keyframes gbSway{0%,100%{transform:rotate(0)}50%{transform:rotate(7deg)}}
@keyframes bushBounce{0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(1.03) scaleY(.97)}}

/* SCENE / BUILDINGS */
#scene{position:absolute;inset:0;z-index:6}
.building{position:absolute;cursor:pointer;z-index:10;display:flex;flex-direction:column;align-items:center;animation:idleBob ease-in-out infinite}
@keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.b-label{font-size:10px;font-weight:900;color:white;text-shadow:0 1px 3px rgba(0,0,0,.65);background:rgba(0,0,0,.28);padding:2px 7px;border-radius:8px;margin-top:2px;white-space:nowrap}

/* PEN */
#pen-area{position:absolute;z-index:10}
.pen-inner{position:relative;border:4px solid #b07030;border-radius:12px;background:rgba(120,200,80,.15);overflow:hidden}
.chk{position:absolute;cursor:pointer;display:flex;flex-direction:column;align-items:center;animation:chkWalk linear infinite}
@keyframes chkWalk{0%{left:8px}46%{left:80px}50%{left:80px;transform:scaleX(-1)}96%{left:8px;transform:scaleX(-1)}100%{left:8px;transform:scaleX(1)}}
.chk-body{animation:breathe 2.2s ease-in-out infinite;transform-origin:center bottom}
.chk-head{animation:peckAnim 5s ease-in-out infinite;transform-origin:center bottom}
@keyframes breathe{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(1.06) translateY(-2px)}}
@keyframes peckAnim{0%,65%,100%{transform:rotate(0)}72%{transform:rotate(30deg) translateY(4px)}80%{transform:rotate(-4deg)}88%{transform:rotate(24deg) translateY(3px)}}

/* FARM GRID */
#farm-grid{position:absolute;z-index:12;display:grid;gap:6px}

.tile:active{filter:brightness(1.25);transform:scale(.93) translateZ(0)}
.tile-inner{display:flex;align-items:center;justify-content:center;flex-direction:column;position:absolute;inset:0}
.tile-plant{
  font-size:clamp(22px, calc(var(--ts) * 0.36), 40px);
  animation:windSway 3.2s ease-in-out infinite;transform-origin:bottom center;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.28));
}
@keyframes windSway{0%,100%{transform:rotate(0) scaleY(1)}30%{transform:rotate(3.5deg) scaleY(1.02)}70%{transform:rotate(-3deg) scaleY(1.01)}}
.tile:nth-child(2n) .tile-plant{animation-delay:-.9s}
.tile:nth-child(3n) .tile-plant{animation-delay:-1.7s}
.tile-bar{position:absolute;bottom:5px;left:6px;right:6px;height:6px;background:rgba(0,0,0,.28);border-radius:3px;overflow:hidden}
.tile-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ffd700,#a0e030);transition:width .6s linear}
.tile-water{position:absolute;top:4px;right:5px;font-size:12px}
.tile.ready{animation:readyGlow .9s ease-in-out infinite alternate}
@keyframes readyGlow{from{filter:brightness(1)}to{filter:brightness(1.3) drop-shadow(0 0 10px #ffd700)}}
.tile.empty-slot .tile-inner::after{content:'＋';font-size:24px;color:rgba(255,255,255,.22);font-family:'Fredoka One'}

/* HUD */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:300;
  padding-top:max(env(safe-area-inset-top,0px),8px);
  padding-left:max(env(safe-area-inset-left,0px),10px);
  padding-right:max(env(safe-area-inset-right,0px),10px);
  padding-bottom:8px;
  background:linear-gradient(180deg,rgba(14,8,2,.65) 0%,transparent 100%);
  display:flex;align-items:center;gap:7px;pointer-events:none;
}
.av{width:42px;height:42px;border-radius:50%;border:2.5px solid #ffd700;background:linear-gradient(135deg,#3a5f30,#6a9f5a);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 2px 8px rgba(0,0,0,.4);flex-shrink:0}
.xp-col{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.lv-row{display:flex;align-items:center;gap:5px}
.lv-tag{font-family:Nunito,sans-serif;font-size:14px;color:#ffd700;text-shadow:0 1px 3px rgba(0,0,0,.5);line-height:1;white-space:nowrap}
.xp-rail{flex:1;max-width:100px;height:8px;background:rgba(0,0,0,.35);border-radius:4px;border:1px solid rgba(255,255,255,.12);position:relative;overflow:hidden}
.xp-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:linear-gradient(90deg,#ffd700,#fff07a);transition:width .5s ease}
.xp-rail.leveling .xp-fill{animation:xpGlow .4s ease-in-out 4}
@keyframes xpGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px 6px rgba(255,215,0,.9),0 0 28px 12px rgba(255,215,0,.5)}}
.xp-lbl{font-size:9px;color:rgba(255,255,255,.5);font-weight:700}
.pill{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.44);border:1.5px solid rgba(255,255,255,.1);border-radius:18px;padding:4px 9px 4px 6px;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);pointer-events:auto;flex-shrink:0}
.pill-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.pi-gold{background:radial-gradient(circle at 35% 35%,#ffe97a,#e8a000);box-shadow:0 0 6px rgba(255,200,0,.5)}
.pi-gem{background:radial-gradient(circle at 35% 35%,#a0d4ff,#1a80e0);box-shadow:0 0 6px rgba(60,140,255,.5)}
.pill-val{font-family:Nunito,sans-serif;font-size:13px;color:white;min-width:26px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.pill-val.bump{animation:pillBump .45s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pillBump{0%{transform:scale(1)}40%{transform:scale(1.5);color:#ffd700}100%{transform:scale(1)}}

/* TOOLBAR */
#toolbar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  /* key: safe-area for iPhone home bar */
  padding-top:8px;
  padding-left:max(env(safe-area-inset-left,0px),4px);
  padding-right:max(env(safe-area-inset-right,0px),4px);
  padding-bottom:max(env(safe-area-inset-bottom,0px),8px);
  background:rgba(10,6,2,.72);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.1);
  box-shadow:0 -4px 24px rgba(0,0,0,.3);
  display:flex;justify-content:center;align-items:center;gap:5px;
}
.tbtn{
  width:62px;height:62px;
  border-radius:14px;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  cursor:pointer;
  -webkit-user-select:none;user-select:none;
  box-shadow:0 4px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.22);
  transition:transform .1s cubic-bezier(.175,.885,.32,1.4);
  position:relative;overflow:visible;
  /* removes 300ms tap delay on Safari */
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.tbtn:active{transform:scale(.85) translateY(2px)}
.tbtn.active{animation:btnPulse 2s ease-in-out infinite}
@keyframes btnPulse{0%,100%{box-shadow:0 4px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.22)}50%{box-shadow:0 4px 18px rgba(0,0,0,.3),0 0 20px var(--gc,rgba(255,255,255,.4)),inset 0 1px 0 rgba(255,255,255,.22)}}
.tbtn.active::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:white;box-shadow:0 0 6px white}
.tbtn-ico{font-size:23px;line-height:1;pointer-events:none}
.tbtn-lbl{font-size:8px;font-weight:900;letter-spacing:.2px;color:rgba(255,255,255,.9);text-transform:uppercase;pointer-events:none}
.t-plant{background:linear-gradient(145deg,#3ec95c,#28a845);--gc:rgba(62,201,92,.65)}
.t-water{background:linear-gradient(145deg,#38b8f0,#1a96d4);--gc:rgba(56,184,240,.65)}
.t-harvest{background:linear-gradient(145deg,#f5c518,#d4a010);--gc:rgba(245,197,24,.65)}
.t-shop{background:linear-gradient(145deg,#a855f7,#8b3ce8);--gc:rgba(168,85,247,.6)}
.t-market{background:linear-gradient(145deg,#ec4899,#c4267a);--gc:rgba(236,72,153,.6)}
.t-tasks{background:linear-gradient(145deg,#fb923c,#ea580c);--gc:rgba(251,146,60,.65)}
.t-coop{background:linear-gradient(145deg,#f07828,#d45e10);--gc:rgba(240,120,40,.65)}
.tb-sep{width:1px;height:40px;background:rgba(255,255,255,.12);margin:0 2px;flex-shrink:0}

/* PARTICLES */
.fly-coin{position:fixed;pointer-events:none;z-index:900;font-size:18px;animation:flyCoin 1.1s cubic-bezier(.4,0,.6,1) forwards}
@keyframes flyCoin{0%{opacity:1;transform:translate(0,0) scale(1)}60%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.3)}100%{opacity:0;transform:translate(var(--tx),calc(var(--ty) - 20px)) scale(.7)}}
.sparkle{position:fixed;pointer-events:none;z-index:901;font-size:20px;animation:sparklePop 1s forwards}
@keyframes sparklePop{0%{opacity:1;transform:translate(0,0) scale(0) rotate(0)}50%{opacity:1;transform:translate(var(--sx),var(--sy)) scale(1.4) rotate(180deg)}100%{opacity:0;transform:translate(var(--sx),calc(var(--sy) - 16px)) scale(.6) rotate(360deg)}}
.harvest-pop{position:fixed;pointer-events:none;z-index:902;font-family:Nunito,sans-serif;color:#ffd700;font-size:22px;text-shadow:0 2px 6px rgba(0,0,0,.5);animation:harvestPop 1.4s forwards;white-space:nowrap}
@keyframes harvestPop{0%{opacity:0;transform:translateY(0) scale(.6)}20%{opacity:1;transform:translateY(-12px) scale(1.2)}70%{opacity:1;transform:translateY(-36px) scale(1)}100%{opacity:0;transform:translateY(-64px) scale(.8)}}

/* LEVEL UP */
#lvup-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:950;background:linear-gradient(135deg,#ffd700,#ff8c00);border-radius:22px;padding:22px 34px;text-align:center;box-shadow:0 8px 40px rgba(255,165,0,.6);pointer-events:none}
#lvup-banner.show{animation:lvupAnim 2.8s forwards}
@keyframes lvupAnim{0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg);opacity:0}12%{transform:translate(-50%,-50%) scale(1.15) rotate(2deg);opacity:1}22%{transform:translate(-50%,-50%) scale(1) rotate(0)}80%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.1);opacity:0}}
#lvup-banner h2{font-family:Nunito,sans-serif;font-size:30px;color:white;text-shadow:0 2px 6px rgba(0,0,0,.3)}
#lvup-banner p{font-size:14px;font-weight:800;color:rgba(255,255,255,.9);margin-top:5px}
.lvup-stars{font-size:26px;margin-bottom:6px}
.star-ring{position:fixed;top:50%;left:50%;pointer-events:none;z-index:949}
.star-burst{position:absolute;font-size:22px;animation:starBurst 1.2s forwards}
@keyframes starBurst{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}100%{opacity:0;transform:translate(calc(-50% + var(--bx)),calc(-50% + var(--by))) scale(1.4)}}

/* BACKDROP + SHEETS */
#backdrop{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.44);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:none}
#backdrop.show{display:block}
/* Prevent scroll bleed-through on safari */
#picker,#sheet{touch-action:none}
#picker{
  position:fixed;bottom:0;left:0;right:0;z-index:510;
  background:#1c1308;border-radius:22px 22px 0 0;
  border-top:1px solid rgba(255,255,255,.12);
  padding-bottom:max(env(safe-area-inset-bottom,0px),8px);
  transform:translateY(100%);transition:transform .32s cubic-bezier(.175,.885,.32,1.1);
  box-shadow:0 -10px 48px rgba(0,0,0,.5);
  max-height:75vh;overflow:hidden;display:flex;flex-direction:column;
}
#picker.open{transform:translateY(0)}
.ph{width:38px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:10px auto 6px;flex-shrink:0}
.pt{font-family:Nunito,sans-serif;font-size:18px;color:white;text-align:center;padding:0 20px 10px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.plist{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;touch-action:pan-y}
.pitem{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;min-height:64px;margin:2px 8px;touch-action:manipulation}
.pitem:active{background:rgba(255,255,255,.08)}
.pico{font-size:34px;width:44px;text-align:center;flex-shrink:0}
.pname{font-size:14px;font-weight:800;color:rgba(255,255,255,.9);flex:1}
.psub{font-size:10px;color:rgba(255,255,255,.4);font-weight:600;margin-top:2px}
.pprice{font-family:Nunito,sans-serif;font-size:14px}
.pcancel{flex-shrink:0;margin:4px 8px 0;padding:14px;border-radius:12px;background:rgba(200,50,50,.12);text-align:center;font-weight:900;font-size:14px;color:#e05050;cursor:pointer;touch-action:manipulation}
.pcancel:active{background:rgba(200,50,50,.22)}
#sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:510;
  background:#1c1308;border-radius:22px 22px 0 0;
  border-top:1px solid rgba(255,255,255,.12);
  padding-bottom:max(env(safe-area-inset-bottom,0px),8px);
  max-height:80vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .34s cubic-bezier(.175,.885,.32,1.1);
  box-shadow:0 -10px 48px rgba(0,0,0,.5);
}
#sheet.open{transform:translateY(0)}
.sh-handle{width:38px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:10px auto 6px;flex-shrink:0}
.sh-head{display:flex;align-items:center;gap:10px;padding:4px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sh-title{font-family:Nunito,sans-serif;font-size:19px;color:white;flex:1}
.sh-close{background:rgba(255,255,255,.1);border:none;border-radius:50%;width:34px;height:34px;color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.sh-close:active{background:rgba(255,255,255,.22)}
.sh-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;touch-action:pan-y}
.sh-sect{font-size:10px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.32);padding:12px 16px 4px}
.sh-row{display:flex;align-items:center;gap:12px;padding:11px 14px;margin:2px 8px;border-radius:14px;cursor:pointer;min-height:64px;touch-action:manipulation}
.sh-row:active{background:rgba(255,255,255,.07)}
.sh-ico{font-size:32px;width:44px;text-align:center;flex-shrink:0}
.sh-info{flex:1;min-width:0}
.sh-name{font-size:14px;font-weight:800;color:rgba(255,255,255,.92)}
.sh-sub{font-size:11px;color:rgba(255,255,255,.36);margin-top:2px}
.sh-price{font-family:Nunito,sans-serif;font-size:15px;white-space:nowrap;flex-shrink:0}
.sh-price.gold{color:#ffd700}.sh-price.green{color:#4cdb6a}.sh-price.red{color:#f07070}
.sh-empty{text-align:center;padding:36px 20px;color:rgba(255,255,255,.3);font-size:14px;font-weight:700;line-height:2}
.coop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.coop-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px}
.coop-card.owned{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06)}
.ca-ico{font-size:44px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3))}
.ca-name{font-family:Nunito,sans-serif;font-size:14px;color:white}
.ca-status{font-size:11px;font-weight:800;color:rgba(255,255,255,.5);text-align:center;white-space:pre-line}
.ca-btn{width:100%;padding:9px;border-radius:10px;border:none;font-family:Nunito,sans-serif;font-size:13px;cursor:pointer;touch-action:manipulation}
.ca-btn.buy{background:linear-gradient(135deg,#3ec95c,#28a845);color:white}
.ca-btn.collect{background:linear-gradient(135deg,#ffd700,#e8a000);color:#3a2000}
.ca-btn.feed{background:linear-gradient(135deg,#f07828,#d45e10);color:white}
.ca-btn.waiting{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
.ca-btn:active{filter:brightness(1.15)}

/* LAND SLOTS */
.slot-grid{position:absolute;z-index:11;display:grid;gap:6px}
.slot{position:relative;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:filter .12s,transform .12s;-webkit-transform:translateZ(0);will-change:transform;}
.slot:active{filter:brightness(1.25);transform:scale(.93) translateZ(0)}
.slot-field{background:linear-gradient(145deg,#aa6640,#7e4422);border:2.5px solid #5c2e10;box-shadow:inset 0 3px 8px rgba(0,0,0,.22),0 5px 0 #4a2010;}
.slot-mill{background:linear-gradient(145deg,#8a7a5a,#6a5a3a);border:2.5px solid #4a3a1a;box-shadow:inset 0 3px 8px rgba(0,0,0,.22),0 5px 0 #3a2a0a;}
.slot-bakery{background:linear-gradient(145deg,#c87848,#a85828);border:2.5px solid #7a3810;box-shadow:inset 0 3px 8px rgba(0,0,0,.22),0 5px 0 #5a2808;}
.slot-empty-buy{background:rgba(255,255,255,.07);border:2.5px dashed rgba(255,255,255,.25);box-shadow:none;animation:slotPulse 2.5s ease-in-out infinite}

// ── LAYOUT ────────────────────────────────
// Pure math — NO getBoundingClientRect (fails when file opened locally in Safari)
// Toolbar height = buttons (62px) + top pad (8px) + safe-area-bottom
// We read safe area from CSS env() via a probe element instead of rAF measurement
function getSafeAreaBottom() {
  // Create a zero-height probe div, read its padding-bottom set via env()
  let probe = document.getElementById('_safe_probe');
  if (!probe) {
    probe = document.createElement('div');
    probe.id = '_safe_probe';
    probe.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:1px;' +
      'padding-bottom:env(safe-area-inset-bottom,0px);pointer-events:none;visibility:hidden;z-index:-1';
    document.body.appendChild(probe);
  }
  return parseFloat(getComputedStyle(probe).paddingBottom) || 0;
}
function getSafeAreaTop() {
  let probe = document.getElementById('_safe_probe_top');
  if (!probe) {
    probe = document.createElement('div');
    probe.id = '_safe_probe_top';
    probe.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;' +
      'padding-top:env(safe-area-inset-top,0px);pointer-events:none;visibility:hidden;z-index:-1';
    document.body.appendChild(probe);
  }
  return parseFloat(getComputedStyle(probe).paddingTop) || 0;
}

function layoutScene() {
  const W  = window.innerWidth;
  const H  = window.innerHeight;
  const saB = getSafeAreaBottom();
  const saT = getSafeAreaTop();

  // Toolbar total height: buttons 62 + top-pad 8 + safe-area-bottom (min 8)
  const tbH  = 62 + 8 + Math.max(saB, 8);
  // HUD height: avatar 42 + top-pad + safe-area-top (min 8)
  const hudH = 42 + 8 + Math.max(saT, 8);

  // Sky/grass split
  const groundTop = Math.round(H * 0.32);

  // Lake
  const lake = document.getElementById('lake');
  lake.style.top    = (groundTop - 18) + 'px';
  lake.style.height = '62px';

  // Buildings
  const house = document.getElementById('building-house');
  const shed  = document.getElementById('building-shed');
  house.style.left = Math.round(W * 0.42) + 'px';
  house.style.top  = (groundTop + 6) + 'px';
  shed.style.left  = Math.round(W * 0.06) + 'px';
  shed.style.top   = (groundTop + 18) + 'px';

  // Farm grid
  const BLDG_H    = 100;
  const gridAreaT = groundTop + BLDG_H;
  const gridAreaB = H - tbH - 4;
  const availH    = Math.max(10, gridAreaB - gridAreaT);
  const availW    = W - 16;

  const cols = G.level < 5 ? 2 : G.level < 10 ? 3 : 4;
  const rows = Math.ceil(G._plotCount / cols);
  const gap  = 6;

  const byW = Math.floor((availW - gap * (cols - 1)) / cols);
  const byH = Math.floor((availH - gap * (rows - 1)) / rows);
  const ts  = Math.max(64, Math.min(byW, byH, 120));

  const gridW = cols * ts + gap * (cols - 1);
  const gridH = rows * ts + gap * (rows - 1);
  const gridL = Math.round((W - gridW) / 2);
  const gridT = Math.max(gridAreaT, gridAreaB - gridH);

  const fg = document.getElementById('slot-grid');
  if (fg) {
    fg.style.left                = gridL + 'px';
    fg.style.top                 = gridT + 'px';
    fg.style.bottom              = 'auto';
    fg.style.transform           = 'none';
    fg.style.width               = gridW + 'px';
    fg.style.gridTemplateColumns = `repeat(${cols},${ts}px)`;
    fg.style.gridTemplateRows    = `repeat(${rows},${ts}px)`;
  }

  // Store tile size for buildSlotGrid
  layoutScene._ts = ts;
  layoutScene._cols = cols;

  // Pen
  const pen      = document.getElementById('pen-area');
  const penInner = document.getElementById('pen-inner');
  const penW     = Math.min(130, Math.round(W * 0.28));
  penInner.style.width  = penW + 'px';
  penInner.style.height = '90px';
  pen.style.right = '8px';
  pen.style.top   = (groundTop + 10) + 'px';
}

    const col=fc[i%fc.length], wrap=document.createElement('div'); wrap.className='flower-wrap';
    wrap.style.cssText=`left:${W*fp.x}px;top:${gY+12+Math.random()*32}px;animation-duration:${2.2+Math.random()*1.5}s;animation-delay:${-Math.random()*2}s`;

    const cir=document.createElementNS('http://www.w3.org/2000/svg','circle');cir.setAttribute('cx','12');cir.setAttribute('cy','12');cir.setAttribute('r','5');cir.setAttribute('fill',col.c);svg.appendChild(cir);
    const stem=document.createElement('div');stem.style.cssText='width:2px;height:11px;background:#4a9020;border-radius:1px';
    wrap.appendChild(svg);wrap.appendChild(stem);deco.appendChild(wrap);
  });
  // Bushes lv2+
  if(G.level>=2){[{x:.03},{x:.78},{x:.91}].forEach(b=>{
    const wrap=document.createElement('div');
    wrap.style.cssText=`position:absolute;left:${W*b.x}px;top:${gY+18+Math.random()*26}px;display:flex;align-items:flex-end;animation:bushBounce ${2.5+Math.random()*2}s ease-in-out infinite`;
    [{w:30,h:26},{w:22,h:20},{w:26,h:22}].forEach((p,i)=>{const puff=document.createElement('div');puff.className='bush-puff';puff.style.cssText=`width:${p.w}px;height:${p.h}px;${i?'margin-left:-8px':''}`;wrap.appendChild(puff);});
    deco.appendChild(wrap);
  });}
  // Fences lv5+
  if(G.level>=5){
    const fX=W*.62,fY=gY+8,posts=8,sp=W*.034;
    for(let i=0;i<posts;i++){
      const x=fX+i*sp, post=document.createElement('div');post.className='fpost';post.style.cssText=`left:${x}px;top:${fY}px;width:8px;height:${30+Math.random()*6}px;z-index:9`;deco.appendChild(post);

    }
  }

  if(G.level>=15){[{x:.02},{x:.88}].forEach(t=>{const el=document.createElement('div');el.style.cssText=`position:absolute;left:${W*t.x}px;top:${gY+2}px;font-size:48px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));animation:idleBob ${4+Math.random()*2}s ease-in-out infinite`;el.textContent='🌲';deco.appendChild(el);});}
}

function initSlots() {
  if (!G.slots) {
    G.slots = LAND_SLOTS.map(s => ({...s}));
    // First 4 are always fields
    G.slots.forEach((s,i) => { if(i<4) s.type='field'; });
  }
}

function buildSlotGrid() {
  initSlots();
  const fg = document.getElementById('slot-grid');
  if (!fg) return;
  fg.innerHTML = '';
  const ts = layoutScene._ts || 80;

  // Count total slots visible (by level)
  const visibleSlots = G.slots.filter(s => s.unlockLv <= G.level || s.type !== 'empty' || s.id < 4);

  // Sort: fields first (by plot offset), then buildings, then buy slots
  const fieldSlots   = G.slots.filter(s => s.type === 'field');
  const buildSlots   = G.slots.filter(s => s.type === 'mill' || s.type === 'bakery');
  const buyableSlots = G.slots.filter(s => s.type === 'empty' && s.unlockLv <= G.level);
  const lockedSlots  = G.slots.filter(s => s.type === 'empty' && s.unlockLv > G.level).slice(0,2);

  const ordered = [...fieldSlots, ...buildSlots, ...buyableSlots, ...lockedSlots];

  // Track plot index for fields
  let plotIdx = 0;

  ordered.forEach(slot => {
    const el = document.createElement('div');
    el.style.setProperty('--ts', ts + 'px');

    if (slot.type === 'field') {
      // Render as farm tile
      const pi = plotIdx++;
      el.className = 'tile slot slot-field';
      el.id = 't' + pi;
      el.style.setProperty('--ts', ts + 'px');
      const inner = document.createElement('div'); inner.className = 'tile-inner';
      const bar   = document.createElement('div'); bar.className   = 'tile-bar';
      const fill  = document.createElement('div'); fill.className  = 'tile-bar-fill'; fill.style.width='0%';
      const wd    = document.createElement('div'); wd.className    = 'tile-water';
      bar.appendChild(fill);
      el.appendChild(inner); el.appendChild(bar); el.appendChild(wd);
      el.addEventListener('touchend', e => { e.preventDefault(); const t=e.changedTouches[0]; onTile(pi,{clientX:t.clientX,clientY:t.clientY}); }, {passive:false});
      el.addEventListener('click', e => onTile(pi, e));
      fg.appendChild(el);
      updateTile(pi);
    }
    else if (slot.type === 'mill' || slot.type === 'bakery') {
      el.className = 'slot slot-' + slot.type;
      renderBuildingSlot(el, slot, ts);
      el.addEventListener('touchend', e => { e.preventDefault(); openBuildingSheet(slot.id); }, {passive:false});
      el.addEventListener('click', () => openBuildingSheet(slot.id));
      fg.appendChild(el);
    }
    else if (slot.type === 'empty') {
      el.className = 'slot slot-empty-buy';
      el.innerHTML = '<div class="slot-icon">🏗️</div><div class="slot-label">'+slot.cost+'🪙</div>';
      el.addEventListener('touchend', e => { e.preventDefault(); openBuySlot(slot.id); }, {passive:false});
      el.addEventListener('click', () => openBuySlot(slot.id));
      fg.appendChild(el);
    }
    else {
      el.className = 'slot slot-locked';
      el.innerHTML = '<div class="slot-icon" style="font-size:20px;opacity:.4">🔒</div><div class="slot-label">Ур.' + slot.unlockLv + '</div>';
      fg.appendChild(el);
    }
  });
}

function renderBuildingSlot(el, slot, ts) {
  const bld = G.buildings[slot.id];
  const queue = bld ? bld.queue : [];
  const isProducing = queue.length > 0;
  let pct = 0, ready = false;
  if (isProducing) {
    const job = queue[0];
    const recipe = Object.values(RECIPES).flat().find(r => r.id === job.recipeId);
    if (recipe) {
      const elapsed = (Date.now() - job.startedAt) / 1000;
      pct = Math.min(100, (elapsed / recipe.time) * 100);
      ready = pct >= 100;
    }
  }
  el.innerHTML = '';
  el.style.flexDirection = 'column';
  el.style.padding = '4px 2px 2px';
  const inner = document.createElement('div');
  inner.style.cssText = 'flex:1;display:flex;align-items:center;justify-content:center;width:100%';
  if (slot.type === 'mill')   buildMill(inner, isProducing, pct, ready);
  if (slot.type === 'bakery') buildBakery(inner, isProducing, pct, ready);
  el.appendChild(inner);
  if (queue.length > 1) {
    const badge = document.createElement('div');
    badge.className = 'slot-badge';
    badge.textContent = queue.length;
    el.appendChild(badge);
  }
}

function openBuySlot(slotId) {
  const slot = G.slots.find(s => s.id === slotId);
  if (!slot || slot.type !== 'empty') return;

  closeAll();
  const body = document.getElementById('sh-body');
  const options = BUILD_OPTIONS.filter(o => o.unlockLv <= G.level);

  document.getElementById('sh-icon').textContent = '🏗️';
  document.getElementById('sh-title').textContent = 'Что построить?';
  body.innerHTML = '';

  const hint = document.createElement('div');
  hint.style.cssText = 'padding:10px 16px 4px;font-size:12px;color:rgba(255,255,255,.4);font-weight:700';
  hint.textContent = 'Стоимость участка: ' + slot.cost + '🪙  |  Выбери постройку:';
  body.appendChild(hint);

  options.forEach(opt => {
    const totalCost = slot.cost + opt.cost;
    const canAfford = G.gold >= totalCost;
    const row = document.createElement('div');
    row.className = 'build-option' + (canAfford ? '' : ' locked');
    // Build preview SVG
    const previewEl = document.createElement('div');
    previewEl.style.cssText = 'width:52px;height:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0';
    if (opt.type === 'mill')   buildMill(previewEl);
    else if (opt.type === 'bakery') buildBakery(previewEl);
    else previewEl.innerHTML = '<div style="font-size:36px">'+opt.icon+'</div>';
    // Remove b-label from preview
    const lbl = previewEl.querySelector('.b-label');
    if (lbl) lbl.remove();
    row.innerHTML = [
      '<div class="bo-info">',
      '<div class="bo-name">' + opt.name + '</div>',
      '<div class="bo-desc">' + opt.desc + '</div>',
      '</div>',
      '<div class="bo-price" style="color:' + (canAfford?'#ffd700':'#f07070') + '">' + (totalCost>0?totalCost+'🪙':'Бесплатно') + '</div>',
    ].join('');
    row.prepend(previewEl);
    const doIt = () => {
      if (!canAfford) { notify('🚫 Не хватает монет!'); return; }
      G.gold -= totalCost;
      slot.type = opt.type;
      if (opt.type === 'field') {
        // Add 4 plots
        G._plotCount += 4;
      } else {
        // Init building state
        G.buildings[slotId] = { type: opt.type, queue: [] };
      }
      renderHUD();
      notify(opt.icon + ' ' + opt.name + ' построена!');
      closeSheet();
      layoutScene();
      buildSlotGrid();
      addXP(30);
    };
    row.addEventListener('touchend', e => { e.preventDefault(); doIt(); }, {passive:false});
    row.addEventListener('click', doIt);
    body.appendChild(row);
  });

  // Show locked options
  BUILD_OPTIONS.filter(o => o.unlockLv > G.level).forEach(opt => {
    const row = document.createElement('div');
    row.className = 'build-option locked';
    row.innerHTML = [
      '<div class="bo-icon">🔒</div>',
      '<div class="bo-info"><div class="bo-name">' + opt.name + '</div>',
      '<div class="bo-desc">Открывается на уровне ' + opt.unlockLv + '</div></div>',
      '<div class="bo-price" style="color:#666">' + opt.cost + '🪙</div>',
    ].join('');
    body.appendChild(row);
  });

  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
}

function renderBuildingBody(body, slotId) {
  const slot = G.slots.find(s => s.id === slotId);
  const bld  = G.buildings[slotId];
  if (!slot || !bld) return;
  body.innerHTML = '';

  const recipes = RECIPES[slot.type] || [];
  const sect = document.createElement('div');
  sect.innerHTML = '<div class="sh-sect">📦 Рецепты</div>';
  body.appendChild(sect);

  recipes.forEach(recipe => {
    const activeJob = bld.queue[0];
    const isActive  = activeJob && activeJob.recipeId === recipe.id;
    const elapsed   = isActive ? (Date.now() - activeJob.startedAt)/1000 : 0;
    const pct       = isActive ? Math.min(100, (elapsed/recipe.time)*100) : 0;
    const isReady   = isActive && pct >= 100;

    // Check ingredients
    const canMake = recipe.input.every(inp => {
      const have = getItemCount(inp.item);
      return have >= inp.qty;
    });

    const card = document.createElement('div');
    card.className = 'recipe-card' + (isReady ? ' ready' : isActive ? ' producing' : '');

    const inputsHtml = recipe.input.map(inp => {
      const have = getItemCount(inp.item);
      const ok   = have >= inp.qty;
      const icon = getItemIcon(inp.item);
      return '<div class="ri' + (ok?'':' missing') + '">' + icon + ' ' + have + '/' + inp.qty + '</div>';
    }).join('');

    card.innerHTML = [
      '<div class="recipe-row">',
      '<div class="recipe-output">' + recipe.outputIcon + '</div>',
      '<div style="flex:1;padding:0 8px">',
      '<div style="font-size:14px;font-weight:900;color:#fff">' + recipe.outputName + '</div>',
      '<div class="recipe-info">',
      '<div class="recipe-inputs">' + inputsHtml + '</div>',
      '<div style="flex:1"></div>',
      '<div class="recipe-earn">+' + recipe.sell + '🪙</div>',
      '</div>',
      isActive && !isReady ? '<div class="recipe-prog"><div class="recipe-prog-fill" style="width:'+pct+'%"></div></div>' : '',
      '<div class="recipe-time">' + (isReady ? '✅ Готово! Нажми чтобы забрать' : isActive ? '⏱ Производство...' : '⏱ '+recipe.time+'с · XP +'+recipe.xp) + '</div>',
      '</div>',
      '</div>',
    ].join('');

    const doRecipe = () => {
      if (isReady) {
        // Collect output
        G.processedBag[recipe.output] = (G.processedBag[recipe.output]||0) + 1;
        bld.queue.shift();
        addXP(recipe.xp);
        renderHUD();
        notify(recipe.outputIcon + ' ' + recipe.outputName + ' готово! Продай на Рынке.');
        updateTaskProgress('produce', 1, recipe.output);
        buildSlotGrid();
        renderBuildingBody(body, slotId);
        return;
      }
      if (isActive) { notify('⏳ Уже идёт производство!'); return; }
      if (!canMake) { notify('🚫 Не хватает ингредиентов!'); return; }
      // Consume ingredients
      recipe.input.forEach(inp => consumeItem(inp.item, inp.qty));
      bld.queue.push({ recipeId: recipe.id, startedAt: Date.now() });
      renderHUD();
      notify('⚙️ Начато: ' + recipe.outputName + ' — ' + recipe.time + 'с');
      buildSlotGrid();
      renderBuildingBody(body, slotId);
    };
    card.addEventListener('touchend', e => { e.preventDefault(); doRecipe(); }, {passive:false});
    card.addEventListener('click', doRecipe);
    body.appendChild(card);
  });

  // Inventory relevant to this building
  const sect2 = document.createElement('div');
  sect2.innerHTML = '<div class="sh-sect">🎒 Ваши запасы</div>';
  body.appendChild(sect2);
  const inv = document.createElement('div');
  inv.style.cssText = 'padding:8px 16px;display:flex;flex-wrap:wrap;gap:8px';
  const items = slot.type==='mill'
    ? [{k:'wheat',icon:'🌾',name:'Пшеница'},{k:'flour',icon:'🌾',name:'Мука'}]
    : [{k:'flour',icon:'🌾',name:'Мука'},{k:'egg',icon:'🥚',name:'Яйцо'},{k:'milk',icon:'🥛',name:'Молоко'},{k:'bread',icon:'🍞',name:'Хлеб'},{k:'cake',icon:'🎂',name:'Торт'}];
  items.forEach(it => {
    const qty = getItemCount(it.k);
    if (qty === 0) return;
    const chip = document.createElement('div');
    chip.style.cssText = 'background:rgba(255,255,255,.08);border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;color:#fff';
    chip.textContent = it.icon + ' ' + it.name + ' ×' + qty;
    inv.appendChild(chip);
  });
  if (!inv.children.length) {
    inv.innerHTML = '<div style="color:rgba(255,255,255,.3);font-size:12px">Запасы пусты — сначала собери урожай</div>';
  }
  body.appendChild(inv);
}

// ── ITEM HELPERS ──────────────────────────────────
function getItemCount(itemKey) {
  if (itemKey === 'wheat')  return G.harvestBag.wheat  || 0;
  if (itemKey === 'carrot') return G.harvestBag.carrot || 0;
  if (itemKey === 'egg')    return G.animalBag.chicken || 0;
  if (itemKey === 'milk')   return G.animalBag.cow     || 0;
  return G.processedBag[itemKey] || 0;
}

function consumeItem(itemKey, qty) {
  if (itemKey === 'wheat')  { G.harvestBag.wheat   = Math.max(0,(G.harvestBag.wheat||0)   - qty); return; }
  if (itemKey === 'carrot') { G.harvestBag.carrot  = Math.max(0,(G.harvestBag.carrot||0)  - qty); return; }
  if (itemKey === 'egg')    { G.animalBag.chicken  = Math.max(0,(G.animalBag.chicken||0)  - qty); return; }
  if (itemKey === 'milk')   { G.animalBag.cow      = Math.max(0,(G.animalBag.cow||0)      - qty); return; }
  G.processedBag[itemKey] = Math.max(0,(G.processedBag[itemKey]||0) - qty);
}

function getItemIcon(itemKey) {
  const icons = {wheat:'🌾',carrot:'🥕',egg:'🥚',milk:'🥛',flour:'🌾',bread:'🍞',cake:'🎂'};
  return icons[itemKey] || '📦';
}

function openSheet(type){
  closeAll();
  const CFG={shop:{icon:'🏪',title:'Магазин'},market:{icon:'💰',title:'Рынок'},coop:{icon:'🐔',title:'Курятник'},tasks:{icon:'📋',title:'Задания и Достижения'},land:{icon:'🏗️',title:'Ферма'}};
  const c=CFG[type];
  document.getElementById('sh-icon').textContent=c.icon;
  document.getElementById('sh-title').textContent=c.title;
  const body=document.getElementById('sh-body'); body.innerHTML='';
  if(type==='shop')   renderShop(body);
  if(type==='market') renderMarket(body);
  if(type==='coop')   renderCoop(body);
  if(type==='tasks')  renderTasks(body);
  if(type==='land')   renderLandSheet(body);
  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}
function closeAll(){closePicker();closeSheet();}

function mkRow(ico,name,sub,priceHtml,onTap){
  const row=document.createElement('div');row.className='sh-row';
  row.innerHTML=`<div class="sh-ico">${ico}</div><div class="sh-info"><div class="sh-name">${name}</div><div class="sh-sub">${sub}</div></div>${priceHtml}`;
  if(onTap){row.addEventListener('touchend',e=>{e.preventDefault();onTap();},{passive:false});row.addEventListener('click',onTap);}
  return row;
}

// ── SHOP ──────────────────────────────────
function renderShop(body){
  let s=document.createElement('div');s.innerHTML='<div class="sh-sect">🌱 Семена</div>';
  Object.entries(CROPS).forEach(([key,c])=>{
    const locked=c.unlockLv>G.level;
    const ph=`<div class="sh-price ${!locked&&G.gold>=c.cost?'gold':'red'}">💰${c.cost}</div>`;
    const row=mkRow(locked?'🔒':c.icon,`${c.name}${locked?` <span style="font-size:10px;color:#f07070">(Ур.${c.unlockLv})</span>`:''}`,`Рост ${c.grow}с · Продажа ${c.sell}🪙 · XP+${c.xp}`,ph,
      locked?null:()=>{closeSheet();setToolById('plant');G._pendingCrop=key;notify(`🌱 ${c.name} выбрана! Нажмите на пустую грядку.`);});
    s.appendChild(row);
  });
  body.appendChild(s);

  s=document.createElement('div');s.innerHTML='<div class="sh-sect">🛠 Улучшения</div>';
  SHOP_ITEMS.forEach(item=>{
    const cnt=G.inventory[item.id]||0;
    const ph=`<div class="sh-price ${G.gold>=item.price?'gold':'red'}">💰${item.price}</div>`;
    const row=mkRow(item.icon,item.name+(cnt>0?` <span style="background:rgba(255,215,0,.2);border-radius:8px;padding:1px 6px;font-size:11px;color:#ffd700">×${cnt}</span>`:''),item.desc,ph,
      ()=>{if(G.gold<item.price){notify('🚫 Не хватает монет!');return;}G.gold-=item.price;G.inventory[item.id]=(G.inventory[item.id]||0)+1;renderHUD();applyItem(item.id);notify(`${item.icon} Куплено: ${item.name}!`);closeSheet();});
    s.appendChild(row);
  });
  body.appendChild(s);
}

function applyItem(id){
  if(id==='sprinkler'){G.plots.forEach((p,i)=>{if(p&&!p.watered){p.watered=true;updateTile(i);}});G.inventory.sprinkler=Math.max(0,(G.inventory.sprinkler||1)-1);notify('💦 Все грядки политы!');}
  if(id==='speedup'){G.plots.forEach(p=>{if(p&&!p.ready)p.progress+=CROPS[p.key].grow*.5;});G.inventory.speedup=Math.max(0,(G.inventory.speedup||1)-1);G.plots.forEach((_,i)=>updateTile(i));notify('⚡ Все растения +50%!');}
  if(id==='fertilizer'){G._fertilizerUses+=3;G.inventory.fertilizer=Math.max(0,(G.inventory.fertilizer||1)-1);notify('🌿 Следующие 3 посадки без полива!');}
}

// ── COOP ──────────────────────────────────
function renderCoop(body){
  const grid=document.createElement('div');grid.className='coop-grid';
  Object.entries(ANIMALS).forEach(([key,a])=>{
    const card=document.createElement('div');card.className='coop-card'+(a.owned?' owned':'');
    const eggs=G.animalBag[key]||0;
    const ready=a.owned&&a.fed&&a.timer>=a.produceTime;
    const tl=a.owned&&a.fed?Math.max(0,a.produceTime-a.timer):0;
    const status=!a.owned?`Купить 💰${a.buyCost}`:!a.fed?'😴 Голодная':ready?`${a.produce} Готово!`:`${a.produce} через ${fmtTime(tl)}`;
    let bc='ca-btn',bt='';
    if(!a.owned){bc+=' buy';bt=`Купить 💰${a.buyCost}`;}
    else if(!a.fed){bc+=' feed';bt=`Покормить 💰${a.feedCost}`;}
    else if(ready){bc+=' collect';bt=`Собрать ${a.produce}`;}
    else{bc+=' waiting';bt=`⏱ ${fmtTime(tl)}`;}
    card.innerHTML=`<div class="ca-ico">${a.icon}</div><div class="ca-name">${a.name}</div><div class="ca-status">${status}${eggs>0?`\n🎒 ×${eggs}`:''}</div><button class="${bc}" ${ready||!a.owned||!a.fed?'':a.fed&&!ready?'disabled':''  }>${bt}</button>`;
    const btn=card.querySelector('button');
    if(btn&&!btn.disabled){
      const doAct=()=>{
        if(!a.owned){if(G.gold<a.buyCost){notify('🚫 Не хватает монет!');return;}G.gold-=a.buyCost;a.owned=true;renderHUD();notify(`${a.icon} Куплено: ${a.name}!`);buildChickens();
          G.stats.animalsOwned=(G.stats.animalsOwned||0)+1;
          checkAchievements('animals_owned', G.stats.animalsOwned);}
        else if(!a.fed){if(G.gold<a.feedCost){notify('🚫 Нет монет на корм!');return;}G.gold-=a.feedCost;a.fed=true;a.timer=0;renderHUD();notify(`${a.icon} ${a.name} накормлена! Жди ${fmtTime(a.produceTime)}`);}
        else if(a.timer>=a.produceTime){G.animalBag[key]=(G.animalBag[key]||0)+1;a.fed=false;a.timer=0;addXP(15);renderHUD();notify(`${a.produce} Собрано: ${a.produceName}! Продай на Рынке.`);
          G.stats.animalProducts=(G.stats.animalProducts||0)+1;
          updateTaskProgress('animal_prod',1);
          checkAchievements('animal_prod', G.stats.animalProducts);}
        body.innerHTML='';renderCoop(body);
      };
      btn.addEventListener('touchend',e=>{e.preventDefault();doAct();},{passive:false});
      btn.addEventListener('click',doAct);
    }
    grid.appendChild(card);
  });
  body.appendChild(grid);
  const tip=document.createElement('div');tip.style.cssText='padding:4px 16px 16px;font-size:11px;color:rgba(255,255,255,.3);text-align:center;font-weight:700';tip.textContent='Корми → жди → собирай → продавай на Рынке';body.appendChild(tip);
}

function fmtTime(s){return s>=60?Math.floor(s/60)+'м '+('0'+s%60).slice(-2)+'с':s+'с';}

// ── GAME ACTIONS ──────────────────────────
function onTile(i,e){
  const p=G.plots[i];
  if(G.tool==='plant'){
    if(p){notify('🚫 Занято!');return;}
    if(G._pendingCrop){plant(i,G._pendingCrop);G._pendingCrop=null;return;}
    showPicker(i);return;
  }
  if(G.tool==='water'){
    if(!p){notify('🚫 Нет растения!');return;}
    if(p.watered){notify('💧 Уже полито!');return;}
    p.watered=true;updateTile(i);spawnCoinPop(e,'💧');
    G.stats.watersCount=(G.stats.watersCount||0)+1;
    updateTaskProgress('water',1);
    checkAchievements('water', G.stats.watersCount);
    return;
  }
  if(G.tool==='harvest'){
    if(!p){notify('🚫 Нет растения!');return;}
    if(!p.ready){notify('⏳ Ещё не созрело!');return;}
    doHarvest(i,e);
  }
}

function plant(i,key){
  const c=CROPS[key];
  if(G.gold<c.cost){notify('🚫 Не хватает монет!');return;}
  G.gold-=c.cost;
  const noW=G._fertilizerUses>0;if(noW)G._fertilizerUses--;
  G.plots[i]={key,progress:0,ready:false,watered:noW,stage:0};
  updateTile(i);renderHUD();
  if(noW)notify('🌿 Удобрение: полив не нужен!');
  updateTaskProgress('plant', 1, key);
}

function doHarvest(i,e){
  const p=G.plots[i],c=CROPS[p.key];
  G.harvestBag[p.key]=(G.harvestBag[p.key]||0)+1;
  G.plots[i]=null;updateTile(i);
  spawnHarvestEffects(e,c);addXP(c.xp);renderHUD();
  notify(`${c.icon} В рюкзак! Продай на Рынке 💰`);
  // Статистика
  G.stats.totalHarvests++;
  G.stats.harvestByKey = G.stats.harvestByKey||{};
  G.stats.harvestByKey[p.key]=(G.stats.harvestByKey[p.key]||0)+1;
  // Задания
  updateTaskProgress('harvest', 1, p.key);
  updateTaskProgress('harvest_any', 1);
  // Достижения
  checkAchievements('harvest_any', G.stats.totalHarvests);
  checkAchievements('crop', G.stats.harvestByKey[p.key], p.key);
}

function setTool(t,el){G.tool=t;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function setToolById(id){const el=document.getElementById('tb-'+id);if(el)setTool(id,el);}

// ── PARTICLES ─────────────────────────────
function spawnCoinPop(e,text){
  const x=(e?.clientX??window.innerWidth/2)-12,y=(e?.clientY??window.innerHeight/2)-16;
  const el=document.createElement('div');el.className='harvest-pop';el.textContent=text;el.style.left=x+'px';el.style.top=y+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1500);
}

function spawnHarvestEffects(e,crop){
  const cx=e?.clientX??window.innerWidth/2,cy=e?.clientY??window.innerHeight/2;
  const pr=document.getElementById('pill-gold').getBoundingClientRect();
  const tx=pr.left+pr.width/2-cx,ty=pr.top+pr.height/2-cy;
  const cnt=Math.min(5,Math.floor(crop.sell/6)+2);
  for(let k=0;k<cnt;k++)setTimeout(()=>{
    const c=document.createElement('div');c.className='fly-coin';c.textContent='🪙';
    const ox=(Math.random()-.5)*60,oy=(Math.random()-.5)*40;
    c.style.left=(cx+ox)+'px';c.style.top=(cy+oy)+'px';
    c.style.setProperty('--tx',(tx-ox)+'px');c.style.setProperty('--ty',(ty-oy)+'px');
    document.body.appendChild(c);setTimeout(()=>c.remove(),1200);
  },k*80);
  setTimeout(()=>{const pv=document.getElementById('hgold');pv.classList.remove('bump');void pv.offsetWidth;pv.classList.add('bump');setTimeout(()=>pv.classList.remove('bump'),500);},cnt*80+900);
  const em=['✨','⭐','🌟','💫'];
  for(let s=0;s<8;s++)setTimeout(()=>{
    const sp=document.createElement('div');sp.className='sparkle';sp.textContent=em[s%em.length];
    const a=s*(360/8)*Math.PI/180,r=50+Math.random()*40;
    sp.style.left=cx+'px';sp.style.top=cy+'px';sp.style.setProperty('--sx',Math.cos(a)*r+'px');sp.style.setProperty('--sy',Math.sin(a)*r+'px');sp.style.animationDelay=s*40+'ms';
    document.body.appendChild(sp);setTimeout(()=>sp.remove(),1200);
  },s*30);
  const pop=document.createElement('div');pop.className='harvest-pop';pop.textContent=crop.icon+'→🎒';pop.style.left=(cx-20)+'px';pop.style.top=(cy-10)+'px';document.body.appendChild(pop);setTimeout(()=>pop.remove(),1500);
}

function spawnGoldEffect(amount,positive){
  const el=document.createElement('div');el.className='harvest-pop';el.textContent=positive?`+${amount}🪙`:`-${amount}🪙`;
  el.style.cssText=`left:${window.innerWidth/2-30}px;top:${window.innerHeight/2}px;color:${positive?'#4cdb6a':'#f07070'}`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
}

// ── XP & LEVEL UP ─────────────────────────
function addXP(amount){
  G.xp+=amount;const need=LEVEL_XP(G.level);
  if(G.xp>=need){G.xp-=need;G.level++;onLevelUp();
    checkAchievements('level', G.level);
    G.stats.maxLevel=Math.max(G.stats.maxLevel||1, G.level);
  }
  renderHUD();
}

function onLevelUp(){
  G._plotCount=Object.entries(LEVEL_TILES).filter(([lv])=>G.level>=parseInt(lv)).reduce((_,e)=>parseInt(e[1]),4);
  const rail=document.getElementById('xp-rail');rail.classList.add('leveling');setTimeout(()=>rail.classList.remove('leveling'),2200);
  const ring=document.getElementById('star-ring');ring.innerHTML='';
  for(let i=0;i<10;i++){const s=document.createElement('div');s.className='star-burst';s.textContent='⭐';const a=i*36*Math.PI/180;s.style.setProperty('--bx',Math.cos(a)*110+'px');s.style.setProperty('--by',Math.sin(a)*110+'px');s.style.animationDelay=i*60+'ms';ring.appendChild(s);}
  setTimeout(()=>ring.innerHTML='',2000);
  const banner=document.getElementById('lvup-banner');
  document.getElementById('lvup-num').textContent=G.level;
  document.getElementById('lvup-msg').textContent=LEVEL_MSGS[G.level]||'🌾 Ферма растёт!';
  banner.classList.remove('show');void banner.offsetWidth;banner.classList.add('show');setTimeout(()=>banner.classList.remove('show'),3000);
  G.gold+=G.level*20;notify(`🎉 Уровень ${G.level}! Бонус +${G.level*20}🪙`);
  buildFarmGrid();buildDeco();buildHouse(document.getElementById('building-house'));buildShed(document.getElementById('building-shed'));
  layoutScene();renderHUD();
}

// ── TICK ──────────────────────────────────
setInterval(()=>{
  G.plots.forEach((p,i)=>{
    if(!p||p.ready)return;if(!p.watered&&p.progress<3)return;
    p.progress+=p.watered?1:.35;const c=CROPS[p.key];
    p.stage=Math.floor((p.progress/c.grow)*(c.stages.length-1));
    if(p.progress>=c.grow){p.ready=true;p.stage=c.stages.length-1;}
    updateTile(i);
  });
  Object.entries(ANIMALS).forEach(([,a])=>{
    if(!a.owned||!a.fed||a.timer>=a.produceTime)return;
    a.timer++;if(a.timer>=a.produceTime)notify(`${a.icon} ${a.name}: ${a.produce} готово! Открой Курятник.`);
  });
  // Building production notifications
  Object.entries(G.buildings||{}).forEach(([slotId,bld])=>{
    if(!bld.queue||!bld.queue.length)return;
    const job=bld.queue[0];
    const recipe=Object.values(RECIPES).flat().find(r=>r.id===job.recipeId);
    if(!recipe)return;
    const elapsed=(Date.now()-job.startedAt)/1000;
    if(elapsed>=recipe.time && !job._notified){
      job._notified=true;
      const slot=G.slots&&G.slots.find(s=>s.id==slotId);
      const bname=slot?(slot.type==='mill'?'Мельница':'Пекарня'):'Здание';
      notify('⚙️ '+bname+': '+recipe.outputIcon+' '+recipe.outputName+' готово!');
      buildSlotGrid();
    }
  });
},1000);


// ── ЕЖЕДНЕВНЫЕ ЗАДАНИЯ: ЛОГИКА ──────────────────────
function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function refreshDailyTasks() {
  const today = todayStr();
  if (G.dailyDate === today && G.dailyTasks.length === 3) return;
  G.dailyDate = today;
  const available = TASK_POOL.filter(t => {
    if (t.crop) return CROPS[t.crop] && CROPS[t.crop].unlockLv <= G.level;
    return true;
  });
  const seed = [...today].reduce((a,c)=>a+c.charCodeAt(0),0);
  const shuffled = [...available].sort((_,__) => Math.sin(seed + available.indexOf(_)) - 0.5);
  G.dailyTasks = shuffled.slice(0,3).map(t => ({id:t.id,done:false,progress:0}));
}

function updateTaskProgress(type, value, cropKey) {
  if(!G.dailyTasks||!G.dailyTasks.length) return;
  G.dailyTasks.forEach(task => {
    if (task.done) return;
    const def = TASK_POOL.find(t => t.id === task.id);
    if (!def) return;
    let matches = false;
    if (def.type === type) {
      if (def.crop) { if (cropKey === def.crop) matches = true; }
      else matches = true;
    }
    if (def.type === 'harvest_any' && type === 'harvest') matches = true;
    if (!matches) return;
    task.progress = Math.min((task.progress||0) + value, def.need);
    if (task.progress >= def.need && !task.done) {
      task.done = true;
      G.gold += def.reward.gold;
      if (def.reward.xp) addXP(def.reward.xp);
      renderHUD();
      setTimeout(() => {
        showTaskComplete(def);
        G.stats.dailyDone = (G.stats.dailyDone||0) + 1;
        checkAchievements('daily_done', G.stats.dailyDone);
      }, 400);
    }
  });
}

function showTaskComplete(def) {
  const el = document.createElement('div');
  if (!document.getElementById('_taskAnim')) {
    const s = document.createElement('style'); s.id='_taskAnim';
    s.textContent = '@keyframes taskCompleteAnim{0%{transform:translate(-50%,-50%) scale(0);opacity:0}12%{transform:translate(-50%,-50%) scale(1.1);opacity:1}22%{transform:translate(-50%,-50%) scale(1)}78%{opacity:1}100%{transform:translate(-50%,-50%) scale(.9);opacity:0}}';
    document.head.appendChild(s);
  }
  el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:960;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:20px;padding:20px 30px;text-align:center;box-shadow:0 8px 40px rgba(34,197,94,.6);pointer-events:none;animation:taskCompleteAnim 2.8s forwards;';
  el.innerHTML = '<div style="font-size:32px;margin-bottom:6px">✅</div>'
    +'<div style="font-family:Nunito,sans-serif;font-size:20px;color:#fff">Задание выполнено!</div>'
    +'<div style="font-size:13px;color:rgba(255,255,255,.85);margin-top:4px">'+def.icon+' '+def.desc+'</div>'
    +'<div style="font-family:Nunito,sans-serif;font-size:16px;color:#ffd700;margin-top:8px">+'+def.reward.gold+'🪙'+(def.reward.xp?' +'+def.reward.xp+' XP':'')+'</div>';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2900);
}

function checkAchievements(type, value, cropKey) {
  ACHIEVEMENTS.forEach(ach => {
    if (G.achievements[ach.id]) return;
    let matches = false;
    if (ach.type === type) {
      if (ach.crop) { if (cropKey === ach.crop) matches = true; }
      else matches = true;
    }
    if (ach.type === 'harvest_any' && type === 'harvest_any') matches = true;
    if (!matches) return;
    if (value >= ach.need) {
      G.achievements[ach.id] = true;
      G.gold += ach.reward.gold;
      G.gems += ach.reward.gems;
      renderHUD();
      setTimeout(() => showAchievement(ach), 700);
    }
  });
}

function showAchievement(ach) {
  if (!document.getElementById('_achAnim')) {
    const s = document.createElement('style'); s.id='_achAnim';
    s.textContent = '@keyframes achSlide{0%{opacity:0;transform:translateX(110%)}12%{opacity:1;transform:translateX(0)}78%{opacity:1}100%{opacity:0;transform:translateX(110%)}}';
    document.head.appendChild(s);
  }
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:80px;right:12px;z-index:850;background:linear-gradient(135deg,#1c1308,#2a1c08);border:2px solid #ffd700;border-radius:16px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 6px 28px rgba(255,215,0,.4);max-width:280px;animation:achSlide 3.5s forwards;';
  el.innerHTML = '<div style="font-size:34px;flex-shrink:0">'+ach.icon+'</div>'
    +'<div>'
    +'<div style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#ffd700;opacity:.7">🏆 Достижение!</div>'
    +'<div style="font-family:Nunito,sans-serif;font-size:15px;color:#fff">'+ach.name+'</div>'
    +'<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:2px">'+ach.desc+'</div>'
    +'<div style="font-size:11px;font-weight:800;color:#ffd700;margin-top:4px">+'+ach.reward.gold+'🪙'+(ach.reward.gems?' +'+ach.reward.gems+'💎':'')+'</div>'
    +'</div>';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

function renderTasks(body) {
  refreshDailyTasks();
  const today = todayStr();
  const hdr = document.createElement('div');
  hdr.innerHTML = '<div class="sh-sect">📅 Ежедневные задания — обновляются в полночь</div>';
  body.appendChild(hdr);

  G.dailyTasks.forEach(task => {
    const def = TASK_POOL.find(t => t.id === task.id);
    if (!def) return;
    const pct = Math.min(100, Math.round(((task.progress||0)/def.need)*100));
    const row = document.createElement('div');
    row.className = 'sh-row';
    row.style.cssText = task.done ? 'opacity:.6;cursor:default' : '';
    row.innerHTML = '<div class="sh-ico">'+(task.done?'✅':def.icon)+'</div>'
      +'<div class="sh-info">'
      +'<div class="sh-name">'+def.desc+(task.done?' <span style="color:#4cdb6a">✓</span>':'')+'</div>'
      +'<div style="margin-top:5px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden">'
      +'<div style="height:100%;width:'+pct+'%;background:'+(task.done?'#4cdb6a':'linear-gradient(90deg,#ffd700,#ff8c00)')+';border-radius:3px;transition:width .4s"></div></div>'
      +'<div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:3px">'+(task.progress||0)+' / '+def.need+'</div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<div style="font-family:Nunito,sans-serif;font-size:13px;color:#ffd700">+'+def.reward.gold+'🪙</div>'
      +(def.reward.xp?'<div style="font-size:10px;color:rgba(255,255,255,.4)">+'+def.reward.xp+' XP</div>':'')
      +'</div>';
    body.appendChild(row);
  });

  const achHdr = document.createElement('div');
  achHdr.innerHTML = '<div class="sh-sect">🏆 Достижения (' + Object.keys(G.achievements).length + '/' + ACHIEVEMENTS.length + ')</div>';
  body.appendChild(achHdr);

  const earned = ACHIEVEMENTS.filter(a=>G.achievements[a.id]);
  const pending = ACHIEVEMENTS.filter(a=>!G.achievements[a.id]);
  [...earned,...pending].forEach(ach => {
    const got = !!G.achievements[ach.id];
    let prog = 0;
    if (!got) {
      if (ach.type==='harvest_any') prog=G.stats.totalHarvests||0;
      else if (ach.type==='sell') prog=G.stats.totalSold||0;
      else if (ach.type==='gold_total') prog=G.stats.totalGoldEarned||0;
      else if (ach.type==='animal_prod') prog=G.stats.animalProducts||0;
      else if (ach.type==='animals_owned') prog=G.stats.animalsOwned||0;
      else if (ach.type==='water') prog=G.stats.watersCount||0;
      else if (ach.type==='level') prog=G.level;
      else if (ach.type==='daily_done') prog=G.stats.dailyDone||0;
      else if (ach.crop) prog=(G.stats.harvestByKey||{})[ach.crop]||0;
    }
    const pct = got?100:Math.min(100,Math.round((prog/ach.need)*100));
    const row = document.createElement('div');
    row.className='sh-row';
    if(got) row.style.cssText='background:rgba(255,215,0,.06);border-radius:14px;margin:2px 8px';
    else row.style.opacity='.72';
    row.innerHTML='<div class="sh-ico" style="'+(got?'':'filter:grayscale(.5)')+'">'+ach.icon+'</div>'
      +'<div class="sh-info">'
      +'<div class="sh-name">'+ach.name+(got?' <span style="color:#ffd700">✓</span>':'')+'</div>'
      +'<div class="sh-sub">'+ach.desc+'</div>'
      +(!got?'<div style="margin-top:4px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#ffd700,#ff8c00);border-radius:3px"></div></div><div style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px">'+prog+'/'+ach.need+'</div>':'')
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<div style="font-size:12px;font-weight:800;color:'+(got?'#4cdb6a':'#ffd700')+'">+'+ach.reward.gold+'🪙</div>'
      +(ach.reward.gems?'<div style="font-size:11px;color:#a0d4ff">+'+ach.reward.gems+'💎</div>':'')
      +'</div>';
    body.appendChild(row);
  });
}

  document.getElementById('hgold').textContent=G.gold.toLocaleString('ru');
  // Бейдж на кнопке заданий
  try {
    refreshDailyTasks();
    const pendingCount = G.dailyTasks.filter(t=>!t.done).length;
    const badge = document.getElementById('tasks-badge');
    if(badge){badge.textContent=pendingCount;badge.style.display=pendingCount>0?'flex':'none';}
  } catch(e){}
  document.getElementById('hgems').textContent=G.gems;
  document.getElementById('hlv').textContent=G.level;
  document.getElementById('xcur').textContent=G.xp;
  document.getElementById('xmax').textContent=LEVEL_XP(G.level);
  document.getElementById('xfill').style.width=(G.xp/LEVEL_XP(G.level)*100)+'%';
}

function notify(msg){
  const c=document.getElementById('notifs'),d=document.createElement('div');d.className='notif';d.textContent=msg;c.appendChild(d);setTimeout(()=>d.remove(),3100);

const SAVE_KEY = 'vesyolaya_ferma_v2'; // v2: tasks + achievements + new crops

function saveGame() {
  try {
    const snap = {
      gold: G.gold, gems: G.gems, xp: G.xp, level: G.level,
      plots: G.plots,
      _plotCount: G._plotCount,
      _fertilizerUses: G._fertilizerUses,
      harvestBag: G.harvestBag,
      animalBag: G.animalBag,
      inventory: G.inventory,
      processedBag: G.processedBag,
      slots: G.slots ? G.slots.map(s=>({id:s.id,type:s.type})) : null,
      buildings: G.buildings,
      animals: Object.fromEntries(
        Object.entries(ANIMALS).map(([k,a]) => [k, {owned:a.owned,fed:a.fed,timer:a.timer}])
      ),
      dailyDate: G.dailyDate,
      dailyTasks: G.dailyTasks,
      achievements: G.achievements,
      stats: G.stats,
      savedAt: Date.now(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(snap));
  } catch(e) { console.warn('Save failed', e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const snap = JSON.parse(raw);
    // Restore scalar state
    G.gold   = snap.gold   ?? G.gold;
    G.gems   = snap.gems   ?? G.gems;
    G.xp     = snap.xp    ?? G.xp;
    G.level  = snap.level  ?? G.level;
    G._plotCount = snap._plotCount ?? G._plotCount;
    G._fertilizerUses = snap._fertilizerUses ?? 0;
    G.harvestBag   = snap.harvestBag   ?? {};
    G.animalBag    = snap.animalBag    ?? {};
    G.inventory    = snap.inventory    ?? {};
    G.processedBag = snap.processedBag ?? {};
    G.buildings    = snap.buildings    ?? {};
    // Restore slot types (which plots became mills/bakeries)
    if (snap.slots && Array.isArray(snap.slots)) {
      if (!G.slots) G.slots = LAND_SLOTS.map(s=>({...s}));
      snap.slots.forEach(saved => {
        const slot = G.slots.find(s => s.id === saved.id);
        if (slot) slot.type = saved.type;
      });
    }
    G.dailyDate  = snap.dailyDate  ?? '';
    G.dailyTasks = snap.dailyTasks ?? [];
    G.achievements = snap.achievements ?? {};
    G.stats      = snap.stats ?? {totalHarvests:0,totalSold:0,totalGoldEarned:0,animalsOwned:0,animalProducts:0,watersCount:0,maxLevel:1,harvestByKey:{},dailyDone:0};
    // Restore plots (plain objects)
    if (Array.isArray(snap.plots)) {
      G.plots = snap.plots;
    }
    // Restore animal runtime state
    if (snap.animals) {
      Object.entries(snap.animals).forEach(([k, saved]) => {
        if (ANIMALS[k]) {
          ANIMALS[k].owned = saved.owned ?? ANIMALS[k].owned;
          ANIMALS[k].fed   = saved.fed   ?? ANIMALS[k].fed;
          ANIMALS[k].timer = saved.timer ?? ANIMALS[k].timer;
        }
      });
    }
    // Compute offline time for animal timers (max 1 hour)
    if (snap.savedAt) {
      const elapsed = Math.min(Math.floor((Date.now() - snap.savedAt) / 1000), 3600);
      if (elapsed > 0) {
        Object.entries(ANIMALS).forEach(([,a]) => {
          if (a.owned && a.fed && a.timer < a.produceTime) {
            a.timer = Math.min(a.timer + elapsed, a.produceTime);
          }
        });
      }
    }
    return true;
  } catch(e) { console.warn('Load failed', e); return false; }
}

// Auto-save every 30 seconds
setInterval(saveGame, 30000);
// Save on tab hide
document.addEventListener('visibilitychange', () => {
  if (document.hidden) saveGame();
});
// Save on iOS pagehide (more reliable than beforeunload)
window.addEventListener('pagehide', saveGame);

// ── INIT ──────────────────────────────────
function init(){
  const hadSave = loadGame();
  makeClouds();
  // Synchronous init — safe for local file:// in Safari
  // (rAF inside local HTML files can behave unpredictably)
  layoutScene();
  buildDeco();
  buildHouse(document.getElementById('building-house'));
  buildShed(document.getElementById('building-shed'));
  buildChickens();
  buildFarmGrid();
  G.plots[0]={key:'wheat', progress:12,ready:false,watered:true, stage:1};
  G.plots[1]={key:'carrot',progress:24,ready:true, watered:true, stage:2};
  G.plots[2]={key:'tomato',progress:10,ready:false,watered:false,stage:0};
  G.plots[3]={key:'wheat', progress:15,ready:true, watered:true, stage:2};
  for(let i=0;i<G._plotCount;i++)updateTile(i);
  renderHUD();
  if (hadSave) {
    notify('💾 Прогресс загружен!');
  } else {
    notify('🌻 Добро пожаловать на ферму!');
  }
  // Safari sometimes hasn't painted yet at init() — re-layout after first frame
  requestAnimationFrame(() => {
    layoutScene();
    buildFarmGrid();
    for(let i=0;i<G._plotCount;i++)updateTile(i);
  });
  // Second pass for slow devices / iPhone Safari safe-area quirks
  setTimeout(() => {
    layoutScene();
    buildFarmGrid();
    for(let i=0;i<G._plotCount;i++)updateTile(i);
  }, 300);
  setTimeout(()=>notify('💡 Полей грядки — урожай растёт быстрее!'),2200);
  setTimeout(()=>notify('🐔 Зайди в Курятник — курица ждёт!'),4600);
}

// Resize + orientation (Safari fires orientationchange before resize)
let _rt;
function onResize(){clearTimeout(_rt);_rt=setTimeout(()=>{layoutScene();buildDeco();},150);}
window.addEventListener('resize',onResize);
window.addEventListener('orientationchange',()=>setTimeout(onResize,300));

// Block scroll/zoom on game world; allow pan inside sheets
// Must be on document for Safari 16+ to reliably preventDefault
document.addEventListener('touchmove', e => {
  if (e.target.closest('.sh-body, .plist')) return; // allow scroll in sheets
  e.preventDefault();
}, { passive: false });

init();

// ── PWA: SERVICE WORKER ───────────────────
if ('serviceWorker' in navigator && location.hostname !== 'www.claudeusercontent.com') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('SW registered', r.scope))
      .catch(e => console.log('SW error', e));
  });
}
